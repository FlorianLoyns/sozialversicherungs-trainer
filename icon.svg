    <rect x="112" y="146" width="48" height="220" rx="4"/>
    <rect x="172" y="146" width="48" height="220" rx="4"/>
    <rect x="232" y="146" width="48" height="220" rx="4"/>
    <rect x="292" y="146" width="48" height="220" rx="4"/>
    <rect x="352" y="146" width="48" height="220" rx="4"/>
  </g>

  <!-- Fundament (Solidargemeinschaft) -->
  <rect x="100" y="376" width="312" height="18" rx="6" fill="white"/>
</svg>
