<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sozialversicherung — Fünf Säulen">
  <!-- Teal-Hintergrund -->
  <rect width="512" height="512" fill="#0d7377"/>

  <!-- Dreiecksgiebel (Pediment) -->
  <path d="M 96 152 L 256 106 L 416 152 Z" fill="white"/>

  <!-- Architrav (Dach-Balken) -->
  <rect x="86" y="152" width="340" height="22" rx="3" fill="white"/>

  <!-- Fünf Säulen, mit Lücken nach oben und unten -->
  <g fill="white">
    <rect x="108" y="186" width="40" height="184" rx="3"/>
    <rect x="172" y="186" width="40" height="184" rx="3"/>
    <rect x="236" y="186" width="40" height="184" rx="3"/>
    <rect x="300" y="186" width="40" height="184" rx="3"/>
    <rect x="364" y="186" width="40" height="184" rx="3"/>
  </g>

  <!-- Stylobat (Sockel) -->
  <rect x="86" y="382" width="340" height="22" rx="3" fill="white"/>

  <!-- Untere Stufe (Krepis) -->
  <rect x="72" y="404" width="368" height="14" rx="3" fill="white"/>
</svg>
